<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Prospecção — LP</title>
<style>
  :root{
    --bg:#11151b;
    --bg2:#0c0f13;
    --card:#1a212b;
    --card2:#212a36;
    --border:#2b3542;
    --text:#e9edf2;
    --muted:#8fa0b3;
    --gold:#d7a34e;
    --gold-dim:#8a6a34;
    --green:#3fc98a;
    --red:#e5595f;
    --blue:#5aa9c9;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:linear-gradient(180deg,var(--bg2),var(--bg) 220px);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom:60px;
  }
  .wrap{max-width:920px;margin:0 auto;padding:14px 14px 40px;}
  header.top{
    display:flex;flex-direction:column;gap:10px;
    padding:18px 4px 14px;
    border-bottom:1px solid var(--border);
    margin-bottom:16px;
  }
  .title-row{display:flex;align-items:baseline;justify-content:space-between;gap:10px;flex-wrap:wrap;}
  h1{font-size:19px;margin:0;letter-spacing:.2px;font-weight:700;}
  h1 span{color:var(--gold);}
  .sub{color:var(--muted);font-size:12.5px;margin-top:2px;}
  .role-switch{display:flex;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:4px;}
  .role-switch button{
    flex:1;border:none;background:transparent;color:var(--muted);
    padding:8px 14px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;
  }
  .role-switch button.active{background:var(--gold);color:#1a1206;}
  .weekstrip{display:flex;gap:6px;margin-top:4px;}
  .weekdot{
    flex:1;text-align:center;padding:6px 2px;border-radius:8px;background:var(--card);
    border:1px solid var(--border);font-size:11px;color:var(--muted);
  }
  .weekdot b{display:block;font-size:13px;color:var(--text);margin-bottom:2px;}
  .weekdot.ok{border-color:var(--green);color:var(--green);}
  .weekdot.low{border-color:var(--red);color:var(--red);}
  .weekdot.today{outline:2px solid var(--gold);}

  .card{
    background:var(--card);border:1px solid var(--border);border-radius:14px;
    padding:16px;margin-bottom:14px;
  }
  .card h2{font-size:14px;margin:0 0 12px;color:var(--gold);text-transform:uppercase;letter-spacing:.6px;}
  .card h3{font-size:13.5px;margin:0 0 8px;color:var(--text);}
  .row{display:flex;gap:10px;flex-wrap:wrap;}
  .row > *{flex:1;min-width:140px;}
  label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;}
  select,input,textarea{
    width:100%;background:var(--card2);border:1px solid var(--border);color:var(--text);
    padding:9px 10px;border-radius:8px;font-size:14px;font-family:inherit;
  }
  textarea{resize:vertical;min-height:56px;}
  .field{margin-bottom:10px;}
  .btn{
    background:var(--gold);color:#1a1206;border:none;padding:11px 16px;border-radius:9px;
    font-weight:700;font-size:14px;cursor:pointer;width:100%;
  }
  .btn.secondary{background:var(--card2);color:var(--text);border:1px solid var(--border);}
  .btn.danger{background:var(--red);color:#1a0808;}
  .btn.small{width:auto;padding:6px 10px;font-size:12px;}
  .pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;}
  .pill.novo{background:rgba(63,201,138,.15);color:var(--green);}
  .pill.carteira{background:rgba(90,169,201,.15);color:var(--blue);}
  .progress{height:8px;border-radius:6px;background:var(--card2);overflow:hidden;margin-top:6px;}
  .progress > div{height:100%;background:var(--gold);}
  .progress.ok > div{background:var(--green);}
  .progress.low > div{background:var(--red);}
  .metaline{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:4px;}
  table{width:100%;border-collapse:collapse;font-size:12.5px;}
  th,td{text-align:left;padding:7px 6px;border-bottom:1px solid var(--border);}
  th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;}
  .muted{color:var(--muted);}
  .flag{background:rgba(229,89,95,.1);border:1px solid rgba(229,89,95,.35);border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:13px;}
  .flag b{color:var(--red);}
  .ok-box{background:rgba(63,201,138,.1);border:1px solid rgba(63,201,138,.35);border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:13px;}
  .tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;}
  .tabs button{
    background:var(--card);border:1px solid var(--border);color:var(--muted);
    padding:8px 14px;border-radius:20px;font-size:12.5px;font-weight:600;white-space:nowrap;cursor:pointer;
  }
  .tabs button.active{background:var(--card2);color:var(--gold);border-color:var(--gold-dim);}
  .search{margin-bottom:10px;}
  .plist{max-height:340px;overflow-y:auto;border:1px solid var(--border);border-radius:10px;}
  .prow{display:flex;justify-content:space-between;align-items:center;padding:9px 10px;border-bottom:1px solid var(--border);gap:8px;}
  .prow:last-child{border-bottom:none;}
  .prow .info{font-size:13px;}
  .prow .info b{display:block;}
  .prow .info span{color:var(--muted);font-size:11.5px;}
  .weeknav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .weeknav button{background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px 12px;cursor:pointer;}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .stat{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;}
  .stat b{font-size:20px;display:block;color:var(--gold);}
  .stat span{font-size:11px;color:var(--muted);}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--green);color:#06231a;
    padding:10px 18px;border-radius:10px;font-weight:700;font-size:13px;box-shadow:0 6px 20px rgba(0,0,0,.4);
    opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:50;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}
  .loading{text-align:center;color:var(--muted);padding:40px 0;}
  .empty{color:var(--muted);font-size:13px;text-align:center;padding:16px 0;}
  a.linklike{color:var(--gold);cursor:pointer;text-decoration:underline;font-size:12px;}
</style>
</head>

async function apiGet(action){
  const url = SCRIPT_URL + '?action=' + encodeURIComponent(action) + '&_=' + Date.now();
  const res = await fetch(url, {method:'GET'});
  if(!res.ok) throw new Error('Falha na leitura (' + res.status + ')');
  return res.json();
}

async function apiPost(payload){
  const res = await fetch(SCRIPT_URL, {
    method:'POST',
    headers: {'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify(payload)
  });
  if(!res.ok) throw new Error('Falha ao salvar (' + res.status + ')');
  const data = await res.json();
  if(data && data.error) throw new Error(data.error);
  return data;
}

async function loadAll(){
  if(!SCRIPT_URL || SCRIPT_URL.indexOf('COLE_AQUI') === 0){
    state.prospects = DEFAULT_PROSPECTS.slice();
    state.logs = [];
    state.config = JSON.parse(JSON.stringify(DEFAULT_CONFIG));
    state.storageOK = false;
    render();
    return;
  }
  try{
    const data = await apiGet('getAll');
    let prospects = data.prospects || [];
    let config = data.config;

    if(!prospects.length){
      await apiPost({action:'seedProspects', prospects: DEFAULT_PROSPECTS});
      prospects = DEFAULT_PROSPECTS.slice();
    }
    if(!config){
      config = JSON.parse(JSON.stringify(DEFAULT_CONFIG));
      await apiPost({action:'saveConfig', config});
    }
    if(!config.gestorPin) config.gestorPin = DEFAULT_CONFIG.gestorPin;

    state.prospects = prospects;
    state.logs = (data.logs || []).map(l=>({...l, retornoFeito: l.retornoFeito===true||l.retornoFeito==='true'||l.retornoFeito==='TRUE'}));
    state.config = config;
    state.storageOK = true;
  }catch(e){
    state.prospects = state.prospects || DEFAULT_PROSPECTS.slice();
    state.logs = state.logs || [];
    state.config = state.config || JSON.parse(JSON.stringify(DEFAULT_CONFIG));
    state.storageOK = false;
    state.syncError = e.message;
  }
  render();
}

async function refreshFromServer(){
  if(!SCRIPT_URL || SCRIPT_URL.indexOf('COLE_AQUI') === 0) return;
  try{
    const data = await apiGet('getAll');
    state.prospects = data.prospects || state.prospects;
    state.logs = (data.logs || []).map(l=>({...l, retornoFeito: l.retornoFeito===true||l.retornoFeito==='true'||l.retornoFeito==='TRUE'}));
    if(data.config) state.config = data.config;
    state.storageOK = true;
    render();
  }catch(e){
    state.storageOK = false;
    render();
  }
}

function todayISO(){ const d=new Date(); return d.toISOString().slice(0,10); }
function fmtDateBR(iso){ const [y,m,d]=iso.split('-'); return d+'/'+m; }

// Monday-based week helpers
function getMonday(dateObj){
  const d = new Date(dateObj);
  const day = d.getDay(); // 0=Sun..6=Sat
  const diff = (day === 0 ? -6 : 1) - day;
  d.setDate(d.getDate()+diff);
  d.setHours(0,0,0,0);
  return d;
}
function isoOf(d){ return d.toISOString().slice(0,10); }
function weekDates(offset){
  const base = new Date();
  base.setDate(base.getDate() + offset*7);
  const monday = getMonday(base);
  const arr=[];
  for(let i=0;i<5;i++){
    const d = new Date(monday);
    d.setDate(monday.getDate()+i);
    arr.push(isoOf(d));
  }
  return arr;
}

function countForDate(iso){
  const dayLogs = state.logs.filter(l=>l.data===iso);
  const lig = dayLogs.filter(l=>l.canal==='ligacao'||l.canal==='whatsapp').length;
  const vis = dayLogs.filter(l=>l.canal==='visita').length;
  const novos = dayLogs.filter(l=>l.tipoCliente==='novo').length;
  return {total:dayLogs.length, lig, vis, novos, logs:dayLogs};
}

function setFormMode(m){ state.formMode = m; state.formProspectId=''; render(); }

function onProspectChange(val){
  state.formProspectId = val;
  const p = state.prospects.find(x=>x.id===val);
  render();
  if(p){
    setTimeout(()=>{ const t=document.getElementById('f_tipo'); if(t) t.value = p.tipoBase; },0);
  }
}

async function salvarContato(){
  const isNovo = state.formMode === 'novo';
  let empresaNome = '';
  let prospectId = '';
  let compradorInformado = '';
  let novoProspect = null;
  let prospectRef = null;

  if(isNovo){
    const nome = document.getElementById('f_novo_nome').value.trim();
    if(!nome){ toast('Digite o nome do cliente novo'); return; }
    const segmento = document.getElementById('f_novo_segmento').value;
    const bairro = document.getElementById('f_novo_bairro').value.trim();
    const telefone = document.getElementById('f_novo_telefone').value.trim();
    const comprador = document.getElementById('f_novo_comprador').value.trim();
    const newId = 'p_' + Date.now();
    novoProspect = {id:newId, empresa:nome, segmento, bairro, telefone, comprador, statusOriginal:'', statusAtual:'Em contato', tipoBase:'novo', endereco:''};
    empresaNome = nome;
    prospectId = newId;
    compradorInformado = comprador;
  } else {
    prospectId = state.formProspectId;
    if(!prospectId){ toast('Selecione um cliente'); return; }
    const p = state.prospects.find(x=>x.id===prospectId);
    if(!p){ toast('Cliente inválido'); return; }
    empresaNome = p.empresa;
    const compradorField = document.getElementById('f_comprador');
    compradorInformado = compradorField ? compradorField.value.trim() : (p.comprador||'');
    prospectRef = p;
  }

  const entry = {
    id: 'l_' + Date.now(),
    prospectId: prospectId,
    empresaNome,
    comprador: compradorInformado,
    data: document.getElementById('f_data').value || todayISO(),
    tipoCliente: document.getElementById('f_tipo').value,
    produto: document.getElementById('f_produto').value,
    canal: document.getElementById('f_canal').value,
    resultado: document.getElementById('f_resultado').value,
    proximaAcao: document.getElementById('f_proxima').value.trim(),
    dataRetorno: document.getElementById('f_retorno').value,
    obs: document.getElementById('f_obs').value.trim(),
    retornoFeito: false,
    criadoEm: new Date().toISOString(),
  };

  try{
    if(isNovo){
      await apiPost({action:'addProspect', prospect: novoProspect});
      state.prospects.push(novoProspect);
    } else {
      prospectRef.comprador = compradorInformado;
      prospectRef.statusAtual = entry.resultado;
      await apiPost({action:'updateProspect', prospect: prospectRef});
    }
    await apiPost({action:'addLog', entry});
    state.logs.push(entry);
    state.storageOK = true;
    toast('Contato registrado!');
  }catch(e){
    state.storageOK = false;
    toast('Não consegui salvar na planilha. Confira a conexão e tente de novo.');
  }

  state.formProspectId='';
  state.formMode='base';
  render();
}

function renderGestor(){

  let html = `<div class="tabs">
    <button class="${state.gestorTab==='painel'?'active':''}" onclick="setGestorTab('painel')">Painel semanal</button>
    <button class="${state.gestorTab==='log'?'active':''}" onclick="setGestorTab('log')">Histórico</button>
    <button class="${state.gestorTab==='retornos'?'active':''}" onclick="setGestorTab('retornos')">Retornos${pendCount?' ('+pendCount+')':''}</button>
    <button class="${state.gestorTab==='cobertura'?'active':''}" onclick="setGestorTab('cobertura')">Cobertura da base</button>
    <button class="${state.gestorTab==='base'?'active':''}" onclick="setGestorTab('base')">Base de clientes</button>
    <button class="${state.gestorTab==='metas'?'active':''}" onclick="setGestorTab('metas')">Metas</button>

function setGestorTab(t){ state.gestorTab=t; render(); }

function renderPainel(){
  const wk = weekDates(state.weekOffset);
  const today = todayISO();
  let totalLig=0, totalVis=0, totalNovos=0, totalCarteira=0;
  let rows = '';
  ['Seg','Ter','Qua','Qui','Sex'].forEach((lbl,i)=>{
    const iso = wk[i];
    const d = countForDate(iso);
    const meta = state.config.metas[i+1];
    totalLig += d.lig; totalVis += d.vis;
    const status = iso > today ? '—' : (d.lig >= meta.ligMin ? '✅' : '⚠️');
    rows += `<tr>
      <td>${lbl} ${fmtDateBR(iso)}</td>
      <td>${d.lig} / ${meta.ligMin}-${meta.ligMax}</td>
      <td>${d.vis} / ${meta.visMin}-${meta.visMax}</td>
      <td>${status}</td>
    </tr>`;
  });
  state.logs.forEach(l=>{
    if(wk.includes(l.data)){
      if(l.tipoCliente==='novo') totalNovos++; else totalCarteira++;
    }
  });
  const totalContatos = totalNovos+totalCarteira;
  const pctNovos = totalContatos ? Math.round((totalNovos/totalContatos)*100) : 0;

  // repeated clients flag
  const counts = {};
  state.logs.forEach(l=>{
    if(wk.includes(l.data)){
      counts[l.empresaNome] = (counts[l.empresaNome]||0)+1;
    }
  });
  const repetidos = Object.entries(counts).filter(([k,v])=>v>=3).sort((a,b)=>b[1]-a[1]);

  let flagsHtml = '';
  if(repetidos.length){
    flagsHtml = `<div class="flag"><b>Atenção:</b> estes clientes foram contatados 3+ vezes nesta semana — confira se há avanço real ou repetição:<br>` +
      repetidos.map(([k,v])=>`${k} (${v}x)`).join(' · ') + `</div>`;
  }
  if(totalContatos>0 && pctNovos < 30){
    flagsHtml += `<div class="flag"><b>Alerta:</b> apenas ${pctNovos}% dos contatos desta semana foram clientes novos. A maior parte é carteira já existente.</div>`;
  }
  if(totalContatos===0){
    flagsHtml += `<div class="flag"><b>Nenhum contato registrado</b> nesta semana até agora.</div>`;
  }
  if(!flagsHtml){
    flagsHtml = `<div class="ok-box">Sem sinais de repetição ou estagnação nesta semana.</div>`;
  }

  return `
  <div class="weeknav">
    <button onclick="changeWeek(-1)">← Semana anterior</button>
    <b>${fmtDateBR(wk[0])} – ${fmtDateBR(wk[4])}</b>
    <button onclick="changeWeek(1)">Próxima →</button>
  </div>
  <div class="card">
    <h2>Resumo da semana</h2>
    <div class="stat-grid">
      <div class="stat"><b>${totalLig}</b><span>Ligações/contatos</span></div>
      <div class="stat"><b>${totalVis}</b><span>Visitas</span></div>
      <div class="stat"><b>${totalNovos}</b><span>Clientes novos</span></div>
      <div class="stat"><b>${pctNovos}%</b><span>% de novos no total</span></div>
    </div>
  </div>
  <div class="card">
    <h2>Meta vs realizado por dia</h2>
    <table>
      <thead><tr><th>Dia</th><th>Contatos</th><th>Visitas</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>
  <div class="card">
    <h2>Sinais de atenção</h2>
    ${flagsHtml}
  </div>`;
}

function renderRetornos(){
  const today = todayISO();
  const showDone = state.showRetornosConcluidos;
  let items = state.logs.filter(l=>l.dataRetorno);
  if(!showDone) items = items.filter(l=>!l.retornoFeito);
  items = items.slice().sort((a,b)=>a.dataRetorno.localeCompare(b.dataRetorno));

  const atrasados = items.filter(l=>l.dataRetorno < today && !l.retornoFeito).length;

  let topFlag = '';
  if(atrasados > 0){
    topFlag = `<div class="flag"><b>${atrasados} retorno(s) atrasado(s).</b> Esses contatos já deveriam ter sido refeitos.</div>`;
  }

  const rows = items.map(l=>{
    let statusLbl, statusColor;
    if(l.retornoFeito){ statusLbl='Concluído'; statusColor='var(--muted)'; }
    else if(l.dataRetorno < today){ statusLbl='Atrasado'; statusColor='var(--red)'; }
    else if(l.dataRetorno === today){ statusLbl='Hoje'; statusColor='var(--gold)'; }
    else { statusLbl='Em breve'; statusColor='var(--green)'; }
    return `
    <div class="prow" style="align-items:flex-start;">
      <div class="info">
        <b>${l.empresaNome} <span style="color:${statusColor};font-size:11.5px;font-weight:700;">· ${statusLbl} — ${fmtDateBR(l.dataRetorno)}</span></b>
        <span>Ação: ${l.proximaAcao || '—'}</span>
        ${l.obs ? `<span>Obs: ${l.obs}</span>` : ''}
        <span>Contato original: ${fmtDateBR(l.data)} · ${l.resultado}</span>
      </div>
      <button class="btn small ${l.retornoFeito?'secondary':''}" onclick="toggleRetornoFeito('${l.id}')">${l.retornoFeito?'Reabrir':'Concluir'}</button>
    </div>`;
  }).join('') || '<div class="empty">Nenhum retorno pendente.</div>';

  return `
  <div class="card">
    <h2>Próximos retornos</h2>
    ${topFlag}
    <label style="display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--muted);margin:10px 0;">
      <input type="checkbox" id="chkShowDone" ${showDone?'checked':''} onchange="toggleShowDone(this.checked)" style="width:auto;">

    </label>

  </div>`;
}

function toggleShowDone(val){ state.showRetornosConcluidos = val; render(); }

async function toggleRetornoFeito(id){
  const l = state.logs.find(x=>x.id===id);
  if(l){
    const novoValor = !l.retornoFeito;
    try{
      await apiPost({action:'updateLog', id, fields:{retornoFeito: novoValor}});
      l.retornoFeito = novoValor;
      state.storageOK = true;
    }catch(e){
      state.storageOK = false;
      toast('Não consegui salvar. Tente de novo.');
    }
    render();
  }
}

function toggleLogDetails(id){
  state.expandedLogId = state.expandedLogId===id ? null : id;
  render();
}

function csvEscape(v){
  return '"' + String(v==null?'':v).replace(/"/g,'""') + '"';
}

function toCSV(rows, headers){
  const head = headers.map(h=>csvEscape(h.label)).join(',');
  const lines = rows.map(r=> headers.map(h=>csvEscape(r[h.key])).join(','));
  return [head, ...lines].join('\r\n');
}

function downloadCSV(content, filename){
  const blob = new Blob(['\ufeff'+content], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 3000);
}

function exportLogsCSV(scope){
  let logs, filename;
  if(scope==='semana'){
    const wk = weekDates(state.weekOffset);
    logs = state.logs.filter(l=>wk.includes(l.data));
    filename = 'contatos_semana_'+wk[0]+'_a_'+wk[4]+'.csv';
  } else {
    logs = state.logs.slice();
    filename = 'contatos_completo_'+todayISO()+'.csv';
  }
  if(!logs.length){ toast('Não há registros para exportar'); return; }
  logs = logs.slice().sort((a,b)=> a.data.localeCompare(b.data) || a.criadoEm.localeCompare(b.criadoEm));
  const headers = [
    {key:'data', label:'Data'},
    {key:'empresaNome', label:'Cliente'},
    {key:'comprador', label:'Contato responsável'},
    {key:'tipoCliente', label:'Tipo (novo/carteira)'},
    {key:'produto', label:'Linha de produto'},
    {key:'canal', label:'Canal'},
    {key:'resultado', label:'Resultado'},
    {key:'proximaAcao', label:'Próxima ação'},
    {key:'dataRetorno', label:'Retorno em'},
    {key:'obs', label:'Observação'},
  ];
  downloadCSV(toCSV(logs, headers), filename);
  toast('CSV exportado!');
}

function exportBaseCSV(){
  const rows = state.prospects.slice().sort((a,b)=>a.empresa.localeCompare(b.empresa));
  const contactedIds = new Set(state.logs.map(l=>l.prospectId));
  rows.forEach(p=> p.contatado = contactedIds.has(p.id) ? 'Sim' : 'Não');
  const headers = [
    {key:'empresa', label:'Cliente'},
    {key:'segmento', label:'Segmento'},
    {key:'bairro', label:'Bairro'},
    {key:'telefone', label:'Telefone'},
    {key:'comprador', label:'Comprador'},
    {key:'statusAtual', label:'Status atual'},
    {key:'tipoBase', label:'Tipo'},
    {key:'contatado', label:'Já contatado?'},
  ];
  downloadCSV(toCSV(rows, headers), 'base_clientes_'+todayISO()+'.csv');
  toast('CSV exportado!');
}

async function excluirLog(id){
  if(!confirm('Excluir este registro?')) return;
  try{
    await apiPost({action:'deleteLog', id});
    state.logs = state.logs.filter(l=>l.id!==id);
    state.storageOK = true;
  }catch(e){
    state.storageOK = false;
    toast('Não consegui excluir. Tente de novo.');
  }
  render();
}

function renderCobertura(){
  const contactedIds = new Set(state.logs.map(l=>l.prospectId));
  const total = state.prospects.length;
  const contacted = state.prospects.filter(p=>contactedIds.has(p.id)).length;
  const neverContacted = state.prospects.filter(p=>!contactedIds.has(p.id) && p.tipoBase!=='carteira');
  const pct = total ? Math.round((contacted/total)*100) : 0;
  let rows = neverContacted.map(p=>`
    <tr><td>${p.empresa}</td><td>${p.segmento}</td><td>${p.bairro||'-'}</td><td>${p.comprador||'-'}</td></tr>
  `).join('');
  if(!rows) rows = `<tr><td colspan="4" class="empty">Todos os clientes da base já foram contatados ao menos uma vez.</td></tr>`;
  return `
  <div class="card">
    <h2>Cobertura da base</h2>
    <div class="stat-grid">
      <div class="stat"><b>${contacted}/${total}</b><span>Já contatados alguma vez</span></div>
      <div class="stat"><b>${pct}%</b><span>Cobertura total</span></div>
    </div>
  </div>
  <div class="card">
    <h2>Nunca contatados (${neverContacted.length})</h2>
    <p class="muted" style="font-size:12.5px;margin-top:-4px;">Se este número não cai com o tempo, é sinal claro de que a prospecção não está avançando pra novos clientes.</p>
    <table>
      <thead><tr><th>Cliente</th><th>Segmento</th><th>Bairro</th><th>Comprador</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function renderMetasEdit(){
  const m = state.config.metas;
  let rows = '';
  for(let i=1;i<=5;i++){
    const dia = m[i];
    rows += `
    <div class="row" style="align-items:flex-end;">
      <div class="field" style="max-width:90px;flex:0 0 90px;"><label>${dia.nome}</label></div>
      <div class="field"><label>Lig. mín</label><input type="number" id="meta_ligmin_${i}" value="${dia.ligMin}"></div>
      <div class="field"><label>Lig. máx</label><input type="number" id="meta_ligmax_${i}" value="${dia.ligMax}"></div>
      <div class="field"><label>Vis. mín</label><input type="number" id="meta_vismin_${i}" value="${dia.visMin}"></div>
      <div class="field"><label>Vis. máx</label><input type="number" id="meta_vismax_${i}" value="${dia.visMax}"></div>
    </div>`;
  }
  return `
  <div class="card">
    <h2>Metas semanais</h2>
    <p class="muted" style="font-size:12.5px;">Estas metas foram carregadas da própria planilha "Agenda Semanal" dela. Ajuste se quiser mudar.</p>
    ${rows}
    <button class="btn" style="margin-top:8px;" onclick="salvarMetas()">Salvar metas</button>
  </div>
  <div class="card">
    <h2>Senha do gestor</h2>
    <p class="muted" style="font-size:12.5px;">Esse PIN é pedido sempre que alguém tenta entrar como Gestor. Troque quando quiser.</p>
    <div class="field"><label>Novo PIN</label><input type="password" inputmode="numeric" id="novoPin" placeholder="Deixe em branco para manter"></div>
    <button class="btn secondary" onclick="salvarPin()">Salvar novo PIN</button>
  </div>`;
}

async function salvarPin(){
  const val = (document.getElementById('novoPin').value || '').trim();
  if(!val){ toast('Nada foi alterado'); return; }
  const antigo = state.config.gestorPin;
  state.config.gestorPin = val;
  try{
    await apiPost({action:'saveConfig', config: state.config});
    toast('PIN atualizado!');
  }catch(e){
    state.config.gestorPin = antigo;
    toast('Não consegui salvar o PIN. Tente de novo.');
  }
  render();
}

async function salvarMetas(){
  const backup = JSON.parse(JSON.stringify(state.config));
  for(let i=1;i<=5;i++){
    state.config.metas[i].ligMin = parseInt(document.getElementById('meta_ligmin_'+i).value)||0;
    state.config.metas[i].ligMax = parseInt(document.getElementById('meta_ligmax_'+i).value)||0;
    state.config.metas[i].visMin = parseInt(document.getElementById('meta_vismin_'+i).value)||0;
    state.config.metas[i].visMax = parseInt(document.getElementById('meta_vismax_'+i).value)||0;
  }
  try{
    await apiPost({action:'saveConfig', config: state.config});
    toast('Metas atualizadas!');
  }catch(e){
    state.config = backup;
    toast('Não consegui salvar. Tente de novo.');
  }
  render();
}

function attachHandlers(){}

loadAll();
</script>
</body>
</html>
